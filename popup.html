<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --primary-color: #1d9bf0;
            --bg-color: #15202b;
            --card-bg: #1e2732;
            --text-main: #ffffff;
            --text-sub: #8b98a5;
            --border-color: #38444d;
        }

        body {
            width: 280px;
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 18px;
            margin: 0;
            font-weight: 800;
        }

        .logo-img {
            width: 28px;
            height: 28px;
            object-fit: contain;
            border-radius: 6px;
        }

        .section {
            background: var(--card-bg);
            padding: 12px 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
        }

        .flex-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .label-text {
            font-size: 14px;
            font-weight: 600;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #3e4144;
            transition: .3s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--primary-color);
        }

        input:checked+.slider:before {
            transform: translateX(18px);
        }

        .whitelist-label {
            font-size: 12px;
            color: var(--text-sub);
            margin-bottom: 8px;
            display: block;
        }

        textarea {
            width: 100%;
            height: 80px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            padding: 10px;
            box-sizing: border-box;
            resize: none;
            font-size: 13px;
            outline: none;
        }

        textarea:focus {
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <div class="header">
        <img src="icons/twitter128.png" alt="Logo" class="logo-img">
        <h1>BlurryTweet</h1>
    </div>

    <div class="section flex-row">
        <span class="label-text">블러 활성화</span>
        <label class="switch">
            <input type="checkbox" id="toggleBlur">
            <span class="slider"></span>
        </label>
    </div>

    <div class="section">
        <span class="whitelist-label">화이트리스트 (줄바꿈으로 구분)</span>
        <textarea id="whitelist" placeholder="@아이디를 입력하세요"></textarea>
    </div>

    <button id="saveBtn">저장 및 적용</button>

    <script src="popup.js"></script>
</body>

</html>
